# LLM Fine-tuning Configuration

# Model
model:
  name: mistralai/Mistral-7B-v0.1
  # Alternatives:
  # - meta-llama/Llama-2-7b-hf
  # - mistralai/Mixtral-8x7B-v0.1
  # - google/gemma-7b

# LoRA Configuration
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - v_proj
  lora_dropout: 0.05
  bias: none

# Data
data:
  raw_dir: data/raw/pokerbench
  processed_dir: data/processed
  output_dir: data/models/llm_poker
  instruction_template: alpaca  # or chatml, custom

# Training
training:
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 100
  max_length: 512
  fp16: true
  load_in_8bit: true

# Evaluation
evaluation:
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true

# Generation (for inference)
generation:
  max_new_tokens: 50
  temperature: 0.7
  top_p: 0.9
  do_sample: true
