# Model configuration for XGBoost
model_type: xgboost

# Data paths
data:
  raw_dir: data/raw/pokerbench
  processed_dir: data/processed
  output_dir: data/models

# Model hyperparameters
model:
  objective: multi:softmax  # or binary:logistic
  max_depth: 8
  learning_rate: 0.1
  n_estimators: 200
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42

# Training settings
training:
  val_split: 0.2
  test_split: 0.1
  stratify: true

# Feature engineering
features:
  use_hand_strength: true
  use_position_features: true
  use_pot_odds: true
  use_action_sequence: true
  max_action_length: 20

# Evaluation
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
  save_confusion_matrix: true
  save_feature_importance: true
